
services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: postgres-fibras-dev
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
volumes:
  postgres-dev-data: